<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gemba Admin Paneli</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --accent:#4C6285;
    --accent-dark:#3B4F6B;
    --bg:#F7F8FA;
    --surface:#FFFFFF;
    --text:#1E2530;
    --text-soft:#5B6472;
    --success:#2F855A;
    --success-bg:#E8F3EC;
    --open-fg:#B3441E;
    --open-bg:#FFF1E6;
    --border:#E2E5EA;
    --radius-lg:14px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  /* ---------- Login ---------- */
  .login-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .login-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:32px;
    width:100%;
    max-width:360px;
  }
  .login-card h1{
    font-size:20px;
    margin:0 0 4px;
  }
  .login-card p{
    color:var(--text-soft);
    font-size:14px;
    margin:0 0 24px;
  }
  .field{margin-bottom:16px;}
  label{
    font-size:13px;
    font-weight:600;
    color:var(--text-soft);
    display:block;
    margin-bottom:6px;
  }
  input[type=email], input[type=password], input[type=text], select{
    width:100%;
    padding:12px 14px;
    font-size:15px;
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    background:var(--surface);
    color:var(--text);
    font-family:inherit;
  }
  input:focus, select:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }
  button{
    font-family:inherit;
    font-size:15px;
    font-weight:600;
    padding:12px 16px;
    border-radius:var(--radius-sm);
    border:none;
    cursor:pointer;
  }
  .btn-primary{background:var(--accent);color:#fff;width:100%;}
  .btn-primary:active{background:var(--accent-dark);}
  .btn-primary:disabled{background:var(--border);color:var(--text-soft);cursor:not-allowed;}
  .btn-secondary{background:var(--surface);color:var(--accent);border:1px solid var(--border);}
  .btn-danger{background:var(--surface);color:var(--open-fg);border:1px solid var(--open-bg);}
  .error{
    background:var(--open-bg);
    color:var(--open-fg);
    padding:10px 14px;
    border-radius:var(--radius-sm);
    font-size:13px;
    margin-bottom:16px;
    display:none;
  }

  /* ---------- App shell ---------- */
  .app{
    max-width:960px;
    margin:0 auto;
    padding:0 20px 60px;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 0;
    border-bottom:1px solid var(--border);
    margin-bottom:20px;
  }
  .topbar h1{font-size:18px;margin:0;}
  .tabs{
    display:flex;
    gap:4px;
    margin-bottom:20px;
    border-bottom:1px solid var(--border);
  }
  .tab-btn{
    background:none;
    border:none;
    padding:10px 16px;
    font-weight:600;
    color:var(--text-soft);
    border-bottom:2px solid transparent;
    border-radius:0;
    cursor:pointer;
  }
  .tab-btn.active{
    color:var(--accent);
    border-bottom-color:var(--accent);
  }
  .filters{
    display:flex;
    gap:12px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  .filters select{width:auto;min-width:160px;}

  .findings-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:16px;
  }
  .finding-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .finding-thumb{
    width:100%;
    height:180px;
    object-fit:cover;
    cursor:pointer;
    background:var(--bg);
  }
  .finding-body{
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .finding-area{font-weight:600;font-size:14px;}
  .finding-responsible{
    font-size:13px;
    color:var(--text-soft);
  }
  .finding-responsible strong{color:var(--text);font-weight:600;}
  .finding-date{
    font-size:12px;
    color:var(--text-soft);
  }
  .empty-state{
    color:var(--text-soft);
    font-size:14px;
    text-align:center;
    padding:40px 0;
  }

  /* ---------- Areas / Responsibles ---------- */
  .simple-form{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    max-width:420px;
  }
  .simple-form input{flex:1;}
  .simple-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    max-width:420px;
  }
  .simple-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    padding:10px 14px;
  }
  .simple-row span{font-size:14px;}
  .simple-row button{padding:6px 12px;font-size:13px;}

  /* ---------- Lightbox ---------- */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:100;
  }
  .lightbox.open{display:flex;}
  .lightbox img{
    max-width:100%;
    max-height:100%;
    border-radius:var(--radius-sm);
  }

  .hidden{display:none !important;}
  .spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,0.4);
    border-top-color:#fff;
    border-radius:50%;
    display:inline-block;
    animation:spin 0.7s linear infinite;
    vertical-align:middle;
    margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>Gemba Admin</h1>
    <p>Devam etmek için giriş yapın.</p>
    <div class="error" id="loginError"></div>
    <div class="field">
      <label for="emailInput">E-posta</label>
      <input type="email" id="emailInput" autocomplete="username">
    </div>
    <div class="field">
      <label for="passwordInput">Şifre</label>
      <input type="password" id="passwordInput" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="loginBtn">Giriş Yap</button>
  </div>
</div>

<!-- APP -->
<div class="app hidden" id="appWrap">
  <div class="topbar">
    <h1>Gemba Admin Paneli</h1>
    <button class="btn-secondary" id="logoutBtn">Çıkış Yap</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabFindingsBtn">Bulgular</button>
    <button class="tab-btn" id="tabAreasBtn">Bölgeler</button>
    <button class="tab-btn" id="tabResponsiblesBtn">Sorumlu Kişiler</button>
  </div>

  <!-- FINDINGS TAB -->
  <div id="tabFindings">
    <div class="filters">
      <select id="filterArea">
        <option value="">Tüm bölgeler</option>
      </select>
      <select id="filterResponsible">
        <option value="">Tüm sorumlular</option>
      </select>
    </div>
    <div class="findings-grid" id="findingsGrid"></div>
    <div class="empty-state hidden" id="findingsEmpty">Kayıt bulunamadı.</div>
  </div>

  <!-- AREAS TAB -->
  <div id="tabAreas" class="hidden">
    <form class="simple-form" id="areaForm">
      <input type="text" id="newAreaInput" placeholder="Yeni bölge adı">
      <button class="btn-primary" type="submit" style="width:auto;">Ekle</button>
    </form>
    <div class="simple-list" id="areaList"></div>
  </div>

  <!-- RESPONSIBLES TAB -->
  <div id="tabResponsibles" class="hidden">
    <form class="simple-form" id="responsibleForm">
      <input type="text" id="newResponsibleInput" placeholder="Yeni sorumlu kişi adı">
      <button class="btn-primary" type="submit" style="width:auto;">Ekle</button>
    </form>
    <div class="simple-list" id="responsibleList"></div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" alt="Büyük görsel">
</div>

<script>
// ============ CONFIG ============
const SUPABASE_URL = 'https://xeettwmxooxtwxzevitk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_pdU1baOJtG9xNJ0Z5WnRrA_XkKCBEh0';
// =================================

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginWrap = document.getElementById('loginWrap');
const appWrap = document.getElementById('appWrap');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const emailInput = document.getElementById('emailInput');
const passwordInput = document.getElementById('passwordInput');
const loginError = document.getElementById('loginError');

const tabFindingsBtn = document.getElementById('tabFindingsBtn');
const tabAreasBtn = document.getElementById('tabAreasBtn');
const tabResponsiblesBtn = document.getElementById('tabResponsiblesBtn');
const tabFindings = document.getElementById('tabFindings');
const tabAreas = document.getElementById('tabAreas');
const tabResponsibles = document.getElementById('tabResponsibles');

const filterArea = document.getElementById('filterArea');
const filterResponsible = document.getElementById('filterResponsible');
const findingsGrid = document.getElementById('findingsGrid');
const findingsEmpty = document.getElementById('findingsEmpty');

const areaForm = document.getElementById('areaForm');
const newAreaInput = document.getElementById('newAreaInput');
const areaList = document.getElementById('areaList');

const responsibleForm = document.getElementById('responsibleForm');
const newResponsibleInput = document.getElementById('newResponsibleInput');
const responsibleList = document.getElementById('responsibleList');

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

function showError(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError(el) {
  el.style.display = 'none';
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---------- AUTH ----------
async function checkSession() {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) {
    showApp();
  } else {
    showLogin();
  }
}

function showLogin() {
  loginWrap.classList.remove('hidden');
  appWrap.classList.add('hidden');
}

function showApp() {
  loginWrap.classList.add('hidden');
  appWrap.classList.remove('hidden');
  loadAreas();
  loadResponsibles();
  loadFindings();
}

loginBtn.addEventListener('click', async () => {
  hideError(loginError);
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="spinner"></span>Giriş yapılıyor...';

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: emailInput.value.trim(),
    password: passwordInput.value
  });

  loginBtn.disabled = false;
  loginBtn.textContent = 'Giriş Yap';

  if (error) {
    showError(loginError, 'Giriş başarısız. E-posta veya şifre hatalı.');
    return;
  }
  showApp();
});

logoutBtn.addEventListener('click', async () => {
  await supabaseClient.auth.signOut();
  showLogin();
});

// ---------- TABS ----------
function setActiveTab(btn, panel) {
  [tabFindingsBtn, tabAreasBtn, tabResponsiblesBtn].forEach(b => b.classList.remove('active'));
  [tabFindings, tabAreas, tabResponsibles].forEach(p => p.classList.add('hidden'));
  btn.classList.add('active');
  panel.classList.remove('hidden');
}

tabFindingsBtn.addEventListener('click', () => setActiveTab(tabFindingsBtn, tabFindings));
tabAreasBtn.addEventListener('click', () => setActiveTab(tabAreasBtn, tabAreas));
tabResponsiblesBtn.addEventListener('click', () => setActiveTab(tabResponsiblesBtn, tabResponsibles));

// ---------- FINDINGS ----------
async function loadFindings() {
  let query = supabaseClient
    .from('gemba_findings')
    .select('*')
    .order('created_at', { ascending: false });

  if (filterArea.value) query = query.eq('area', filterArea.value);
  if (filterResponsible.value) query = query.eq('responsible', filterResponsible.value);

  const { data, error } = await query;

  if (error) {
    findingsGrid.innerHTML = '';
    findingsEmpty.textContent = 'Bulgular yüklenirken hata oluştu.';
    findingsEmpty.classList.remove('hidden');
    return;
  }

  renderFindings(data || []);
}

function renderFindings(findings) {
  findingsGrid.innerHTML = '';

  if (findings.length === 0) {
    findingsEmpty.textContent = 'Kayıt bulunamadı.';
    findingsEmpty.classList.remove('hidden');
    return;
  }
  findingsEmpty.classList.add('hidden');

  findings.forEach(f => {
    const card = document.createElement('div');
    card.className = 'finding-card';

    const date = new Date(f.created_at).toLocaleString('tr-TR');

    card.innerHTML = `
      <img class="finding-thumb" src="${f.photo_url}" alt="Bulgu fotoğrafı">
      <div class="finding-body">
        <div class="finding-area">${escapeHtml(f.area)}</div>
        <div class="finding-responsible">Sorumlu: <strong>${escapeHtml(f.responsible)}</strong></div>
        <div class="finding-date">${date}</div>
      </div>
    `;

    card.querySelector('.finding-thumb').addEventListener('click', () => {
      lightboxImg.src = f.photo_url;
      lightbox.classList.add('open');
    });

    findingsGrid.appendChild(card);
  });
}

filterArea.addEventListener('change', loadFindings);
filterResponsible.addEventListener('change', loadFindings);

lightbox.addEventListener('click', () => {
  lightbox.classList.remove('open');
});

// ---------- AREAS ----------
async function loadAreas() {
  const { data, error } = await supabaseClient
    .from('gemba_areas')
    .select('*')
    .order('name', { ascending: true });

  if (error) return;

  filterArea.innerHTML = '<option value="">Tüm bölgeler</option>';
  areaList.innerHTML = '';

  (data || []).forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.name;
    opt.textContent = a.name;
    filterArea.appendChild(opt);

    const row = document.createElement('div');
    row.className = 'simple-row';
    row.innerHTML = `
      <span>${escapeHtml(a.name)}</span>
      <button class="btn-danger" data-id="${a.id}">Sil</button>
    `;
    row.querySelector('button').addEventListener('click', () => deleteArea(a.id));
    areaList.appendChild(row);
  });
}

areaForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = newAreaInput.value.trim();
  if (!name) return;

  const { error } = await supabaseClient
    .from('gemba_areas')
    .insert({ name });

  if (!error) {
    newAreaInput.value = '';
    loadAreas();
  }
});

async function deleteArea(id) {
  const { error } = await supabaseClient
    .from('gemba_areas')
    .delete()
    .eq('id', id);

  if (!error) loadAreas();
}

// ---------- RESPONSIBLES ----------
async function loadResponsibles() {
  const { data, error } = await supabaseClient
    .from('gemba_responsibles')
    .select('*')
    .order('name', { ascending: true });

  if (error) return;

  filterResponsible.innerHTML = '<option value="">Tüm sorumlular</option>';
  responsibleList.innerHTML = '';

  (data || []).forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.name;
    opt.textContent = r.name;
    filterResponsible.appendChild(opt);

    const row = document.createElement('div');
    row.className = 'simple-row';
    row.innerHTML = `
      <span>${escapeHtml(r.name)}</span>
      <button class="btn-danger" data-id="${r.id}">Sil</button>
    `;
    row.querySelector('button').addEventListener('click', () => deleteResponsible(r.id));
    responsibleList.appendChild(row);
  });
}

responsibleForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = newResponsibleInput.value.trim();
  if (!name) return;

  const { error } = await supabaseClient
    .from('gemba_responsibles')
    .insert({ name });

  if (!error) {
    newResponsibleInput.value = '';
    loadResponsibles();
  }
});

async function deleteResponsible(id) {
  const { error } = await supabaseClient
    .from('gemba_responsibles')
    .delete()
    .eq('id', id);

  if (!error) loadResponsibles();
}

checkSession();
</script>
</body>
</html>
